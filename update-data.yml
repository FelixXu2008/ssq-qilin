name: Auto Update SSQ Data

on:
  # 定时触发：每周二、四、日晚 22:30（开奖后约30分钟）
  schedule:
    - cron: '30 14 * * 0,2,4'   # UTC 14:30 = 北京时间 22:30

  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        run: pip install requests

      - name: 🕷️ 抓取开奖数据
        run: python crawler.py

      - name: 📊 检查数据文件
        id: check
        run: |
          if [ -f data.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "最新数据预览："
            head -20 data.json
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ data.json 未生成"
          fi

      - name: 📝 提交更新
        if: steps.check.outputs.exists == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # 只在有变更时提交
          git diff --cached --quiet || git commit -m "🎱 自动更新开奖数据 $(date +'%Y-%m-%d %H:%M')"
          git push

      - name: 🔔 失败通知
        if: failure()
        run: echo "⚠️ 数据更新失败，请检查日志"
